name: A/B Experiment

on:
  workflow_dispatch:
    inputs:
      checker:
        description: "Checker to use"
        required: false
        default: rule_based
        type: choice
        options: [rule_based, classifier]
  push:
    tags: ["v*"]

jobs:
  run-experiment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Write .env
        run: echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" > .env

      - name: Run experiment
        run: |
          python experiments/compare_strategies.py \
            --checker ${{ github.event.inputs.checker || 'rule_based' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results-${{ github.sha }}
          path: results/
          retention-days: 90
